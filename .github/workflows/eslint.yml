name: eslint

env:
  documentation: 'https://github.com/indexdata/matchkeys/blob/main/js/README.md#verify-matchkeys-development'
  NODEJS_VERSION: '22'

on:
  workflow_dispatch:
  push:
    paths:
      - '**.mjs'
      - '**.js'
  pull_request:
    paths:
      - '**.mjs'
      - '**.js'
jobs:
  eslint:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
        working-directory: ./js
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Show documentation
        run: |
          echo "Documentation: ${{ env.documentation }}" | tee -a "$GITHUB_STEP_SUMMARY"
      - name: Do setup-node
        uses: actions/setup-node@v7
        with:
          node-version: ${{ env.NODEJS_VERSION }}
          check-latest: true
      - name: Do npm install
        run: npm install
      - name: Do lint
        run: npm run lint
