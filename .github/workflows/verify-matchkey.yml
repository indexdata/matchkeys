name: verify-matchkey

env:
  documentation: 'https://github.com/indexdata/matchkeys/blob/main/js/README.md#conduct-tests'
  NODEJS_VERSION: '22'

permissions:
  contents: read

on:
  push:
    paths:
      - '**.mjs'
      - '**.js'
      - 'test/**.json'
      - '.github/workflows/verify-matchkey.yml'
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - '**.mjs'
      - '**.js'
      - 'test/**.json'
jobs:
  verify-matchkey:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
        working-directory: ./js
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Show documentation
        run: |
          echo "Documentation: ${{ env.documentation }}" | tee -a "$GITHUB_STEP_SUMMARY"

      - name: Do setup-node
        uses: actions/setup-node@v7
        with:
          node-version: ${{ env.NODEJS_VERSION }}
          check-latest: true

      - name: Do npm install
        run: npm install

      - name: Get list of files
        id: files
        uses: hanseltimeindustries/get-changed-files@v1

      - name: Show list of files
        run: |
          for changed_file in ${{ steps.files.outputs.all }}; do
            echo "changed_file: ${changed_file}"
          done

      - name: Determine matchkeys
        id: determine-matchkeys
        env:
          FILES_LIST: ${{ steps.files.outputs.all }}
        run: |
          matchkeys=$(python3 ../.github/workflows/scripts/determine_matchkeys.py -l info)
          echo "matchkeys=$matchkeys" | tee -a "$GITHUB_OUTPUT"

      - name: Show determined matchkeys
        env:
          MATCHKEYS: ${{ steps.determine-matchkeys.outputs.matchkeys }}
        run: |
          if [ -n "$MATCHKEYS" ]; then
            echo "Determined modified matchkeys: $MATCHKEYS" | tee -a "$GITHUB_STEP_SUMMARY"
          else
            echo "No modified matchkeys were determined." | tee -a "$GITHUB_STEP_SUMMARY"
          fi

      - name: Run test of relevant matchkeys
        env:
          MATCHKEYS: ${{ steps.determine-matchkeys.outputs.matchkeys }}
        if: ${{ steps.determine-matchkeys.outputs.matchkeys != '' }}
        run: |
          echo "See the run step logs for test results." >> "$GITHUB_STEP_SUMMARY"
          echo "FIXME: Disabled while further development." >> "$GITHUB_STEP_SUMMARY"
          for matchkey in $MATCHKEYS; do
            echo "FIXME: Disabled: Running test: ${matchkey} ..." | tee -a "$GITHUB_STEP_SUMMARY"
            # FIXME: Disabled: npm run "test-${matchkey}"
          done

      - name: Method 2 -- Get changed files (pull_request)
        if: github.event_name == 'pull_request'
        id: changes-pr
        run: |
          git fetch origin ${{ github.base_ref }}
          CHANGED_FILES=$(git diff --name-only origin/${{ github.base_ref }}...HEAD)
          echo "changed-files=$CHANGED_FILES" | tee -a "$GITHUB_OUTPUT"

      - name: Method 2 -- Get changed files (push)
        if: github.event_name == 'push'
        id: changes-push
        run: |
          git fetch origin ${{ github.ref_name }}
          CHANGED_FILES=$(git diff --name-only ${{ github.event.before }} ${{ github.event.after }})
          echo "changed_files=$CHANGED_FILES" | tee -a "$GITHUB_OUTPUT"

      - name: Method 2 -- Show list of files
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "Changed files: ${{ steps.changes-pr.outputs.changed-files }}"
          else
            echo "Changed files: ${{ steps.changes-push.outputs.changed-files }}"
          fi
