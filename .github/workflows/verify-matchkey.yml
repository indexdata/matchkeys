name: verify-matchkey

env:
  documentation: 'https://github.com/indexdata/matchkeys/blob/main/js/README.md#conduct-tests'
  NODEJS_VERSION: '22'

permissions:
  contents: read

on:
  push:
    paths:
      - '**.mjs'
      - '**.js'
      - 'test/**.json'
      - '.github/workflows/verify-matchkey.yml'
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - '**.mjs'
      - '**.js'
      - 'test/**.json'
jobs:
  verify-matchkey:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
        working-directory: ./js
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Show documentation
        run: |
          echo "Documentation: ${{ env.documentation }}" | tee -a "$GITHUB_STEP_SUMMARY"

      - name: Do setup-node
        uses: actions/setup-node@v7
        with:
          node-version: ${{ env.NODEJS_VERSION }}
          check-latest: true

      - name: Do npm install
        run: npm install

      - name: Get list of files
        id: files
        uses: hanseltimeindustries/get-changed-files@v1

      - name: Show list of files
        run: |
          for changed_file in ${{ steps.files.outputs.all }}; do
            echo "changed_file: ${changed_file}"
          done
